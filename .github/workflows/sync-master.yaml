# 任意 main 推送后把 master 与 main 对齐，避免 jsDelivr 无 @ 时仍读旧 master
name: sync-master

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to master
        run: git push origin HEAD:refs/heads/master
