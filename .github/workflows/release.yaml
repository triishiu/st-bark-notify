name: release

on:
  push:
    tags:
      - 'Bark空回通知'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish Bark空回通知.json to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: Bark空回通知
        run: |
          set -e
          NOTES=$(cat <<'EOF'
          下载 **Bark空回通知.json** 导入酒馆助手（与仓库根目录一致，`@main` CDN）。

          发版后脚本逻辑更新只需刷新酒馆页面，不必改 JSON。
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TAG" --notes "$NOTES"
          fi

          # 去掉历史英文名附件，只保留中文文件名
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}/assets" --jq '.[] | select(.name != "Bark空回通知.json") | .id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] && gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" || true
              done

          test -f "Bark空回通知.json"
          gh release upload "$TAG" "Bark空回通知.json" --clobber
